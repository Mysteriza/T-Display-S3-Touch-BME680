; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:lilygo-t-display-s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200
lib_ldf_mode = deep+
build_unflags =
	-std=gnu++11
build_flags =
	-std=gnu++17
	-Wno-cpp
	-D LV_CONF_SKIP=1
	-D LV_COLOR_DEPTH=16
	-D LV_FONT_MONTSERRAT_12=1
	-D LV_FONT_MONTSERRAT_18=1
	-D LV_FONT_MONTSERRAT_20=1
	-D LV_FONT_MONTSERRAT_22=1
	-D LV_FONT_MONTSERRAT_32=1
	-D LV_FONT_MONTSERRAT_36=1
	-D LV_FONT_MONTSERRAT_48=1
	-D USER_SETUP_LOADED=1
	-D ST7789_DRIVER=1
	-D TFT_PARALLEL_8_BIT=1
	-D TFT_WIDTH=170
	-D TFT_HEIGHT=320
	-D TFT_INVERSION_ON=1
	-D TFT_RGB_ORDER=TFT_BGR
	-D TFT_CS=6
	-D TFT_DC=7
	-D TFT_RST=5
	-D TFT_WR=8
	-D TFT_RD=9
	-D TFT_D0=39
	-D TFT_D1=40
	-D TFT_D2=41
	-D TFT_D3=42
	-D TFT_D4=45
	-D TFT_D5=46
	-D TFT_D6=47
	-D TFT_D7=48
	-D TFT_BL=38
	-D TFT_BACKLIGHT_ON=1
lib_deps =
	lvgl/lvgl@8.3.11
	bodmer/TFT_eSPI@2.5.43
	https://github.com/boschsensortec/Bosch-BSEC2-Library.git
	https://github.com/boschsensortec/Bosch-BME68x-Library.git
	https://github.com/lewisxhe/SensorLib.git
